name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================================
  # Job 1: Firmware build
  # Compiles the full ESP-IDF project for esp32 target.
  # Resolves managed components (esp_lvgl_port, esp_lcd_ili9341, littlefs, mdns).
  # Verifies the build links cleanly and fits within the 1500K factory partition.
  # ============================================================================
  firmware-build:
    name: Firmware Build (ESP-IDF v5.4.4 / esp32)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.4
          target: esp32
          path: '.'
          command: idf.py build

  # ============================================================================
  # Job 2: Host unit tests
  # Compiles echem_core sources with host GCC (no ESP32 toolchain).
  # Catches any accidental esp_*/FreeRTOS includes in echem_core (would break here).
  # Fetches Unity test framework from GitHub (internet access required in runners).
  # ============================================================================
  host-tests:
    name: Host Unit Tests (echem_core, Ubuntu GCC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CMake and GCC
        run: sudo apt-get install -y cmake build-essential

      - name: Configure (fetches Unity via FetchContent)
        run: cmake -B build_host host_test

      - name: Build test executables
        run: cmake --build build_host

      - name: Run tests
        run: ctest --test-dir build_host --output-on-failure

      - name: Verify echem_core purity (no esp_*/FreeRTOS headers)
        run: |
          echo "=== Checking echem_core for forbidden #include directives ==="
          if grep -rn '^#include.*esp_' components/echem_core/include components/echem_core/src; then
            echo "FAIL: #include of esp_* found in echem_core — breaks host testability invariant"
            exit 1
          fi
          if grep -rn '^#include.*[Ff]ree[Rr]TOS\|^#include.*freertos' components/echem_core/include components/echem_core/src; then
            echo "FAIL: #include of FreeRTOS found in echem_core — breaks host testability invariant"
            exit 1
          fi
          echo "PASS: echem_core is clean (no esp_*/FreeRTOS #include directives)"

  # ============================================================================
  # Job 3: L5 Protocol conformance tests (Python pytest, no hardware)
  # Tests the P5 WebSocket binary wire format, JSON event schema, CSV format,
  # and mock WS server interaction.  All tests run in-process — no device needed.
  # Skips live-device tests (Section C) since AQUAHMET_HOST is not set in CI.
  # ============================================================================
  protocol-conformance:
    name: L5 Protocol Conformance Tests (Python pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Run L5 protocol conformance tests (no device)
        run: pytest test/test_p5_protocol.py -v -k "not device" --tb=short

      - name: Verify net_comms_protocol.h is IDF-free (host-testable invariant)
        run: |
          echo "=== Checking net_comms_protocol.h for forbidden #include directives ==="
          if grep -n '^#include.*esp_' components/net_comms/include/net_comms_protocol.h; then
            echo "FAIL: net_comms_protocol.h includes esp_* — breaks host testability"
            exit 1
          fi
          if grep -n '^#include.*freertos\|^#include.*FreeRTOS' components/net_comms/include/net_comms_protocol.h; then
            echo "FAIL: net_comms_protocol.h includes FreeRTOS — breaks host testability"
            exit 1
          fi
          echo "PASS: net_comms_protocol.h is IDF-free"

  # ============================================================================
  # Job 4: Playwright E2E tests (P6 SPA — no device, mock WS backend)
  # Tests the SPA against mock_backend.js using Playwright routeWebSocket.
  # Covers: WS connect, start/abort, binary DataPoint frames, CSV export,
  #         reference import, x-axis toggle, reconnect/resync.
  # ============================================================================
  playwright-e2e:
    name: Playwright E2E Tests (P6 SPA, headless Chromium)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Install Node dependencies
        working-directory: web
        run: npm install

      - name: Install Playwright browsers (Chromium only)
        working-directory: web
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        working-directory: web
        run: npm test -- --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ============================================================================
  # Job 5: P7 serial protocol conformance tests (Python pytest, no hardware)
  # Tests the NDJSON serial wire format, event/command name parity with P5 WS
  # protocol, mock serial stream parsing, and command structure validation.
  # All tests run in-process — no device, no real serial port needed.
  # Skips live-device tests (Section C) since AQUAHMET_PORT is not set in CI.
  # ============================================================================
  serial-protocol-conformance:
    name: P7 Serial Protocol Conformance Tests (Python pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Run P7 serial protocol conformance tests (no device)
        run: pytest test/test_p7_serial.py -v -k "not device" --tb=short

      - name: Verify serial_comms_protocol.h is IDF-free (host-testable invariant)
        run: |
          echo "=== Checking serial_comms_protocol.h for forbidden #include directives ==="
          if grep -n '^#include.*esp_' components/serial_comms/include/serial_comms_protocol.h; then
            echo "FAIL: serial_comms_protocol.h includes esp_* — breaks host testability"
            exit 1
          fi
          if grep -n '^#include.*freertos\|^#include.*FreeRTOS' components/serial_comms/include/serial_comms_protocol.h; then
            echo "FAIL: serial_comms_protocol.h includes FreeRTOS — breaks host testability"
            exit 1
          fi
          echo "PASS: serial_comms_protocol.h is IDF-free"

  # ============================================================================
  # Job 6: P7 PTY / pipe E2E serial tests (Python pytest, no hardware)
  # Tests the full NDJSON command/response cycle via an in-process MockDevice
  # that drives the same Gaussian cell model as the Wokwi ADS1115 chip.
  # Uses os.pipe() (skipped on Windows CI; runs on ubuntu-latest).
  # ============================================================================
  serial-pty-e2e:
    name: P7 Serial PTY E2E Tests (Python pytest, pipe-based MockDevice)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Run P7 pipe E2E tests (no device, no socat needed)
        run: pytest test/test_p7_pty.py -v -k "not device" --tb=short

  # ============================================================================
  # Job 7: L7 Wokwi full-device simulation (free OSS tier)
  #
  # Runs the REAL compiled firmware binary inside the Wokwi ESP32 simulator with:
  #   - Custom MCP4921 SPI DAC chip      (chips/mcp4921.c → .wasm)
  #   - Custom ADS1115 I2C ADC chip      (chips/ads1115.c  → .wasm)
  #   - ILI9341 TFT display (built-in Wokwi part)
  #   - 2× pushbuttons + 2× LEDs (GPIO14/0/12/13)
  # The ADS1115 chip embeds the Gaussian DPV cell simulator — the same model
  # used in sim/main_sim.c and test/mock_ws_server.py (shared model invariant).
  #
  # Token: get a FREE token for public repos at https://wokwi.com/dashboard/ci
  # Add it as a GitHub secret named WOKWI_CLI_TOKEN in Settings → Secrets → Actions.
  #
  # If WOKWI_CLI_TOKEN is not set, this job is SKIPPED — CI still passes.
  # ============================================================================
  wokwi-simulation:
    name: L7 Wokwi Full-Device Simulation (ESP32 + custom chips)
    runs-on: ubuntu-latest
    needs: firmware-build
    # Note: 'secrets' context is NOT available in job-level 'if' expressions
    # (GitHub Actions limitation — only available at step level).
    # We guard each step with an env flag set by the first step instead.

    steps:
      - name: Check WOKWI_CLI_TOKEN (skip job gracefully if not set)
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          if [ -z "$WOKWI_CLI_TOKEN" ]; then
            echo "::notice::WOKWI_CLI_TOKEN secret is not configured — skipping L7 Wokwi simulation."
            echo "To enable: get a FREE token at https://wokwi.com/dashboard/ci"
            echo "           then add it as a GitHub secret named WOKWI_CLI_TOKEN."
            echo "SKIP_WOKWI=true" >> "$GITHUB_ENV"
          else
            echo "WOKWI_CLI_TOKEN is set — proceeding with simulation."
            echo "SKIP_WOKWI=false" >> "$GITHUB_ENV"
          fi
      - name: Checkout repository
        if: env.SKIP_WOKWI != 'true'
        uses: actions/checkout@v4

      - name: Build firmware (ESP-IDF v5.4.4)
        if: env.SKIP_WOKWI != 'true'
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.4
          target: esp32
          path: '.'
          command: idf.py build

      - name: Install wokwi-cli
        if: env.SKIP_WOKWI != 'true'
        run: curl -L https://wokwi.com/ci/install.sh | sh

      - name: Compile custom chips to WASM
        if: env.SKIP_WOKWI != 'true'
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          echo "=== Compiling MCP4921 SPI DAC chip ==="
          wokwi-cli chip compile chips/mcp4921.c -o chips/mcp4921.chip.wasm
          echo "=== Compiling ADS1115 I2C ADC chip ==="
          wokwi-cli chip compile chips/ads1115.c  -o chips/ads1115.chip.wasm
          echo "=== Custom chips compiled successfully ==="
          ls -lh chips/*.wasm

      - name: Run Wokwi simulation — expect serial hello handshake
        if: env.SKIP_WOKWI != 'true'
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: .
          timeout: 60000
          expect_text: '"t":"hello"'
          fail_text: 'Guru Meditation'
          serial_log_file: wokwi-serial.log

      - name: Upload Wokwi serial log
        if: env.SKIP_WOKWI != 'true' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-serial-log
          path: wokwi-serial.log
          retention-days: 7
